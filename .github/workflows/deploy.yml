name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate admin password hash
      env:
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      run: |
        ADMIN_HASH=$(echo -n "$ADMIN_PASSWORD" | sha256sum | cut -d' ' -f1)
        echo "ADMIN_HASH=$ADMIN_HASH" >> $GITHUB_ENV
    
    - name: Update config.js
      env:
        DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        ADMIN_HASH: ${{ env.ADMIN_HASH }}
      run: |
        sed -i "s/DRIVE_FOLDER_ID_PLACEHOLDER/$DRIVE_FOLDER_ID/g" config.js
        sed -i "s/ADMIN_HASH_PLACEHOLDER/$ADMIN_HASH/g" config.js
    
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4