<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galéria - Erna & Roland</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <!-- Vissza navigáció -->
        <a href="index.html" class="back-link">← Vissza</a>
        
        <div class="content">
            <h1>Fotógaléria</h1>
            
            <!-- Loading spinner -->
            <div id="loadingSpinner" class="loading-spinner">
                <div class="spinner"></div>
                <p>Betöltés...</p>
            </div>
            
            <!-- Galéria grid -->
            <div id="gallery" class="gallery-grid">
                <!-- A fájlok JavaScript-ből kerülnek be -->
            </div>
            
            <!-- Üres galéria üzenet -->
            <div id="emptyMessage" class="empty-message" style="display: none;">
                <p>Még nincsenek feltöltött fotók</p>
            </div>
        </div>
    </div>

    <!-- Lightbox modal -->
    <div id="lightbox" class="lightbox" style="display: none;">
        <div class="lightbox-content">
            <span class="lightbox-close">&times;</span>
            <button id="prevBtn" class="lightbox-nav lightbox-prev">&lt;</button>
            <button id="nextBtn" class="lightbox-nav lightbox-next">&gt;</button>
            <img id="lightboxImage" src="" alt="">
            <video id="lightboxVideo" style="display: none;" controls></video>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const gallery = document.getElementById('gallery');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const emptyMessage = document.getElementById('emptyMessage');
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxVideo = document.getElementById('lightboxVideo');
        const lightboxClose = document.querySelector('.lightbox-close');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let currentIndex = 0;
        let allFiles = [];
        let touchStartX = 0;

        // R2 URL генератор
        function getR2Url(fileName) {
            return `https://eskuvo-upload.r2.cloudflarestorage.com/${fileName}`;
        }

        // Fájl típus meghatározása
        function getFileType(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) return 'image';
            if (['mp4', 'webm', 'mov', 'avi'].includes(ext)) return 'video';
            return 'unknown';
        }

        // Galéria betöltése
        async function loadGallery() {
            try {
                const response = await fetch(`${CONFIG.WORKER_URL}/files`);
                allFiles = await response.json();
                
                loadingSpinner.style.display = 'none';
                
                if (allFiles.length === 0) {
                    emptyMessage.style.display = 'block';
                    return;
                }
                
                // Fájlok megjelenítése
                allFiles.forEach((file, index) => {
                    const item = createGalleryItem(file, index);
                    gallery.appendChild(item);
                });
            } catch (error) {
                console.error('Failed to load gallery:', error);
                loadingSpinner.style.display = 'none';
                emptyMessage.style.display = 'block';
            }
        }

        // Galéria elem létrehozása
        function createGalleryItem(file, index) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            const fileType = getFileType(file.name);
            const fileUrl = getR2Url(file.name);
            
            if (fileType === 'video') {
                // Videó
                const video = document.createElement('video');
                video.src = fileUrl;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                video.controls = false;
                
                item.appendChild(video);
                item.addEventListener('click', () => openLightbox(index, true));
            } else if (fileType === 'image') {
                // Kép
                const img = document.createElement('img');
                img.src = fileUrl;
                img.alt = file.name;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                
                item.appendChild(img);
                item.addEventListener('click', () => openLightbox(index, false));
            }
            
            return item;
        }

        // Lightbox megnyitása
        function openLightbox(index, isVideo) {
            currentIndex = index;
            const file = allFiles[index];
            const fileUrl = getR2Url(file.name);
            const fileType = getFileType(file.name);
            
            lightbox.style.display = 'flex';
            
            if (fileType === 'video') {
                lightboxImage.style.display = 'none';
                lightboxVideo.style.display = 'block';
                lightboxVideo.src = fileUrl;
            } else {
                lightboxVideo.style.display = 'none';
                lightboxImage.style.display = 'block';
                lightboxImage.src = fileUrl;
            }
            
            updateNavButtons();
        }

        // Előző/Következő gombokhoz képnél
        function updateNavButtons() {
            prevBtn.style.display = currentIndex > 0 ? 'block' : 'none';
            nextBtn.style.display = currentIndex < allFiles.length - 1 ? 'block' : 'none';
        }

        // Előző kép
        function showPrevious() {
            if (currentIndex > 0) {
                const fileType = getFileType(allFiles[currentIndex].name);
                openLightbox(currentIndex - 1, fileType === 'video');
            }
        }

        // Következő kép
        function showNext() {
            if (currentIndex < allFiles.length - 1) {
                const fileType = getFileType(allFiles[currentIndex].name);
                openLightbox(currentIndex + 1, fileType === 'video');
            }
        }

        // Swipe kezelés
        function handleSwipe(e) {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > 50) { // Minimum 50px swipe
                if (diff > 0) {
                    // Balra swipe → következő kép
                    showNext();
                } else {
                    // Jobbra swipe → előző kép
                    showPrevious();
                }
            }
        }

        // Keyboard kezelés
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowLeft') showPrevious();
                if (e.key === 'ArrowRight') showNext();
                if (e.key === 'Escape') {
                    lightbox.style.display = 'none';
                    lightboxVideo.src = '';
                    lightboxImage.src = '';
                }
            }
        });

        // Lightbox bezárása
        lightboxClose.addEventListener('click', () => {
            lightbox.style.display = 'none';
            lightboxVideo.src = '';
            lightboxImage.src = '';
        });

        prevBtn.addEventListener('click', showPrevious);
        nextBtn.addEventListener('click', showNext);

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.style.display = 'none';
                lightboxVideo.src = '';
                lightboxImage.src = '';
            }
        });

        lightbox.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].clientX;
        });

        lightbox.addEventListener('touchend', handleSwipe);

        // Galéria betöltésének indítása
        loadGallery();
    </script>
</body>
</html>
